<header class="navbar" [class.overlay]="overlay">
  <a class="brand-link" routerLink="/inicio" aria-label="Ir a inicio" (click)="closeMenu()">
    <img class="icon" src="/Icon_1X1Normal.webp" alt="Logo Crystal Alquiladora" />
  </a>

  <button
    class="menu-toggle"
    [class.open]="menuOpen"
    type="button"
    (click)="toggleMenu()"
    [attr.aria-expanded]="menuOpen"
    aria-controls="main-nav"
    aria-label="Abrir o cerrar menu"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav id="main-nav" class="menu" [class.open]="menuOpen" aria-label="Navegacion principal">
    <a routerLink="/inicio" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Inicio</a>
    <a routerLink="/catalogo" routerLinkActive="active" (click)="closeMenu()">Catalogo</a>
    <a routerLink="/servicios" routerLinkActive="active" (click)="closeMenu()">Servicios</a>
    <a routerLink="/nosotros" routerLinkActive="active" (click)="closeMenu()">Nosotros</a>
    <a routerLink="/contacto" routerLinkActive="active" (click)="closeMenu()">Contacto</a>
  </nav>
</header>
