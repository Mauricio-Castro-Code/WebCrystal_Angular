<section class="hero">
  <img
    class="hero-bg"
    src="/Chachapa.webp"
    alt=""
    aria-hidden="true"
    loading="eager"
    fetchpriority="high"
    decoding="async"
    width="1920"
    height="1280"
  />

  <div class="hero-shell">
    <div class="hero-content">
      <div class="hero-copy">
        <h1 class="hero-title">
          Haz de tu evento<br />
          algo <span class="hero-highlight">inolvidable</span>
        </h1>

        <p class="hero-description">
          Ofrecemos servicios premium de alquiler para eventos en Puebla.
          Desde mobiliario elegante hasta carpas de lujo, cuidamos cada detalle
          para que tu solo disfrutes.
        </p>
      </div>

      <div class="hero-actions" aria-label="Acciones principales">
        <a
          class="hero-btn hero-btn-primary"
          routerLink="/contacto"
          aria-label="Solicitar cotizacion de mobiliario"
        >
          Solicitar Cotizacion <span aria-hidden="true">-></span>
        </a>
        <a
          class="hero-btn hero-btn-secondary"
          routerLink="/servicios"
          aria-label="Ver servicios disponibles"
        >
          Ver Servicios
        </a>
      </div>
    </div>
  </div>
</section>
