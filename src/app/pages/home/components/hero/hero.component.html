<section class="hero">
  <img
    class="hero-bg"
    src="/Chachapa.webp"
    alt=""
    aria-hidden="true"
    loading="eager"
    fetchpriority="high"
    decoding="async"
    width="1920"
    height="1280"
  />
  <div class="hero-shell">
    <div class="hero-content">
      <p class="hero-kicker">EXPERTOS EN EVENTOS</p>

      <h1 class="hero-title">
        Eventos <span>Inolvidables</span>
      </h1>

      <p class="hero-description">
        Renta de mobiliario premium en Puebla para transformar tu celebracion
        en una experiencia unica.
      </p>

      <div class="hero-actions">
        <a class="hero-btn hero-btn-light" routerLink="/catalogo" aria-label="Ver catalogo de mobiliario">
          Ver Catalogo
        </a>
        <a class="hero-btn hero-btn-solid" routerLink="/contacto" aria-label="Solicitar cotizacion por contacto">
          Solicitar Cotizacion
        </a>
      </div>
    </div>
  </div>
</section>
