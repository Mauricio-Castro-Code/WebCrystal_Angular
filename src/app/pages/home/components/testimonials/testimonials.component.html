<section class="testimonials" aria-labelledby="testimonials-title">
  <div class="testimonials-shell">
    <header class="testimonials-header">
      <h2 id="testimonials-title">Lo que dicen nuestros clientes</h2>
      <span class="testimonials-accent" aria-hidden="true"></span>
    </header>

    <div class="testimonials-grid">
      @for (item of testimonials; track item.author) {
        <article class="testimonial-card">
          <p class="testimonial-stars" aria-label="Calificacion de 5 estrellas">★★★★★</p>
          <p class="testimonial-quote">"{{ item.quote }}"</p>
          <p class="testimonial-author">— {{ item.author }}</p>
        </article>
      }
    </div>
  </div>
</section>
