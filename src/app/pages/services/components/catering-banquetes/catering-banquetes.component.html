<section class="catering-banquetes" aria-labelledby="catering-banquetes-title">
  <div class="catering-banquetes__shell">
    <div class="catering-banquetes__grid">
      <div class="catering-banquetes__content">
        <p class="catering-banquetes__eyebrow">Gastronomia</p>
        <h2 id="catering-banquetes-title">Catering y Banquetes</h2>

        <div class="catering-banquetes__features">
          @for (feature of features; track feature.title) {
            <article class="feature-card">
              <div class="feature-card__icon" aria-hidden="true">
                @switch (feature.icon) {
                  @case ('banquete') {
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path
                        d="M4.5 3.2a.8.8 0 0 1 .8.8V6.8a2.3 2.3 0 0 1-2 2.28V20a.8.8 0 0 1-1.6 0V9.08a2.3 2.3 0 0 1-2-2.28V4a.8.8 0 0 1 1.6 0v2.8a.7.7 0 0 0 1.4 0V4a.8.8 0 0 1 1.6 0v2.8a.7.7 0 0 0 1.4 0V4a.8.8 0 0 1 .8-.8Zm13.66 0c.25 0 .48.11.63.3.14.2.18.46.1.7L17.6 8.9V20a.8.8 0 1 1-1.6 0v-4.8h-2.5a.8.8 0 0 1-.77-1l2.9-10.4a.8.8 0 0 1 .77-.6h1.76Z"
                      />
                    </svg>
                  }
                  @case ('catering') {
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path
                        d="M5.8 4a2.8 2.8 0 0 1 5.6 0v1.2a2.8 2.8 0 0 1-5.6 0V4Zm1.6 0v1.2a1.2 1.2 0 0 0 2.4 0V4a1.2 1.2 0 0 0-2.4 0Zm8.9.3a2.2 2.2 0 0 1 2.2 2.2v8.3a3.2 3.2 0 0 1-3.2 3.2h-1.4v1.9a.8.8 0 1 1-1.6 0V8.4a4 4 0 0 1 4-4.1Zm0 1.6a2.4 2.4 0 0 0-2.4 2.5V16h1.4a1.6 1.6 0 0 0 1.6-1.6V6.5a.6.6 0 0 0-.6-.6Zm-11.8 3a.8.8 0 0 1 .8.8v2.7h3.4V9.7a.8.8 0 1 1 1.6 0v4.8a2.5 2.5 0 0 1-2.5 2.5h-.9V20a.8.8 0 1 1-1.6 0v-3h-.8A2.5 2.5 0 0 1 1.9 14V9.7a.8.8 0 0 1 .8-.8Zm.8 5.1a.9.9 0 0 0 .9.9h1.7a.9.9 0 0 0 .9-.9V14H5.3Z"
                      />
                    </svg>
                  }
                }
              </div>
              <div class="feature-card__content">
                <h3>{{ feature.title }}</h3>
                <p>{{ feature.description }}</p>
              </div>
            </article>
          }
        </div>

      </div>

      <figure class="catering-banquetes__media">
        <img
          src="/VajillaCuadrada.webp"
          alt="Montaje de banquete con vajilla premium"
          loading="lazy"
          decoding="async"
          fetchpriority="low"
          width="1670"
          height="2192"
        />
      </figure>
    </div>
  </div>
</section>
