<article class="service-card">
  <div class="service-image">
    <img [src]="service.image" [alt]="service.title" loading="lazy" />
  </div>

  <div class="service-content">
    <h3>{{ service.title }}</h3>
    <p>{{ service.description }}</p>
    <a [routerLink]="service.ctaLink">{{ service.ctaLabel }}</a>
  </div>
</article>
