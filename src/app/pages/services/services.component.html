<section class="services-hero" aria-labelledby="services-title">
  <div class="services-hero__shell">
    <h1 id="services-title">Nuestros Servicios</h1>
    <span class="services-hero__accent" aria-hidden="true"></span>
    <p>
      Soluciones integrales para eventos sociales y corporativos con mobiliario premium, catering
      profesional y logistica especializada.
    </p>
  </div>
</section>

<app-catering-banquetes></app-catering-banquetes>
<app-renta-mobiliario></app-renta-mobiliario>
@defer (on viewport) {
  <app-carpas></app-carpas>
} @placeholder {
  <section class="services-placeholder services-placeholder--carpas" aria-hidden="true"></section>
}
@defer (on viewport) {
  <app-services-cta-card></app-services-cta-card>
} @placeholder {
  <section class="services-placeholder services-placeholder--cta" aria-hidden="true"></section>
}
