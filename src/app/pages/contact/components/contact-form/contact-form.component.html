<form class="contact-form" action="https://formsubmit.co/your@email.com" method="POST">
  <div class="field-row">
    <label for="name">Nombre</label>
    <input
      id="name"
      name="name"
      type="text"
      placeholder="Tu nombre"
      autocomplete="name"
      required
    />
  </div>

  <div class="field-row">
    <label for="phone">Telefono</label>
    <input
      id="phone"
      name="phone"
      type="tel"
      placeholder="222 000 0000"
      inputmode="tel"
      autocomplete="tel"
      required
    />
  </div>

  <div class="field-row">
    <label for="eventType">Tipo de evento</label>
    <input
      id="eventType"
      name="eventType"
      type="text"
      placeholder="Boda, corporativo, social..."
      autocomplete="off"
    />
  </div>

  <div class="field-row">
    <label for="message">Mensaje</label>
    <textarea id="message" name="message" rows="5" placeholder="Cuentanos fecha, lugar y numero de invitados"></textarea>
  </div>

  <app-button type="submit" label="Enviar solicitud" variant="primary" [fullWidth]="true"></app-button>
</form>
