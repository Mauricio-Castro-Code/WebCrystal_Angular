<section class="maps" aria-labelledby="maps-title">
  <h2 id="maps-title">Ubicacion</h2>
  <p class="maps__address">Blvd Valsequillo 1811, Universidades, Puebla, Pue, CP 72589</p>

  @if (mapLoaded()) {
    <div class="maps__frame-wrap">
      <iframe
        title="Ubicacion de Alquiladora Crystal en Puebla"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        src="https://www.google.com/maps?q=Blvd+Valsequillo+1811,+Puebla&output=embed"
      ></iframe>
    </div>
  } @else {
    <button type="button" class="maps__load-button" (click)="loadMap()">
      Cargar mapa interactivo
    </button>
  }

  <a
    class="maps__link"
    href="https://maps.app.goo.gl/fh4cqoXmTP5fTWQLA"
    target="_blank"
    rel="noopener noreferrer"
  >
    Ver en Google Maps
  </a>
</section>
