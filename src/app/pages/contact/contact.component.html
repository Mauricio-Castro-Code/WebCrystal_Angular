<section class="contact-hero" aria-labelledby="contact-title">
  <div class="contact-hero__shell">
    <h1 id="contact-title">Contacto</h1>
    <span class="contact-hero__accent" aria-hidden="true"></span>
    <p>
      Estamos listos para ayudarte a planear tu proximo evento con atencion personalizada y una
      propuesta alineada a tu estilo.
    </p>
  </div>
</section>

<section class="contact-content" aria-label="Canales de contacto y formulario">
  <div class="contact-content__shell">
    <div class="contact-content__grid">
      <app-send-message></app-send-message>

      <div class="contact-content__side">
        <app-contact-info></app-contact-info>
        <app-contact-maps></app-contact-maps>
      </div>
    </div>
  </div>
</section>
