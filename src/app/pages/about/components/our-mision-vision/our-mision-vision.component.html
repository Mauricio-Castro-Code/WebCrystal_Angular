<section class="our-mision-vision" aria-labelledby="our-mision-vision-title">
  <div class="our-mision-vision__shell">
    <header class="our-mision-vision__header">
      <h2 id="our-mision-vision-title">Mision y Vision</h2>
      <span class="our-mision-vision__accent" aria-hidden="true"></span>
    </header>

    <div class="our-mision-vision__grid">
      @for (card of cards; track card.title) {
        <article class="statement-card">
          <div class="statement-card__icon" aria-hidden="true">
            @switch (card.icon) {
              @case ('mision') {
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M12 2.8a9.2 9.2 0 1 1 0 18.4 9.2 9.2 0 0 1 0-18.4Zm0 1.6a7.6 7.6 0 1 0 0 15.2 7.6 7.6 0 0 0 0-15.2Zm4.03 2.7a.8.8 0 0 1 .83.84l-.42 6.2a.8.8 0 0 1-.58.72l-6.2 1.75a.8.8 0 0 1-.99-.99l1.75-6.2a.8.8 0 0 1 .72-.58l6.2-.42a.8.8 0 0 1 .69.3Zm-4.18 3.12-.97 3.45 3.45-.97.28-4-2.76.19Z"
                  />
                </svg>
              }
              @case ('vision') {
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M12 4c4.9 0 9.16 2.95 10.92 7.2a2 2 0 0 1 0 1.6C21.16 17.05 16.9 20 12 20c-4.9 0-9.16-2.95-10.92-7.2a2 2 0 0 1 0-1.6C2.84 6.95 7.1 4 12 4Zm0 1.6c-4.25 0-7.97 2.55-9.45 6.22a.4.4 0 0 0 0 .36C4.03 15.85 7.75 18.4 12 18.4s7.97-2.55 9.45-6.22a.4.4 0 0 0 0-.36C19.97 8.15 16.25 5.6 12 5.6Zm0 2.3a4.1 4.1 0 1 1 0 8.2 4.1 4.1 0 0 1 0-8.2Zm0 1.6a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5Z"
                  />
                </svg>
              }
            }
          </div>

          <h3>{{ card.title }}</h3>
          <p>{{ card.description }}</p>
        </article>
      }
    </div>
  </div>
</section>
