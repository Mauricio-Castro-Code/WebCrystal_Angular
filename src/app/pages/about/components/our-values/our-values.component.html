<section class="our-values" aria-labelledby="our-values-title">
  <div class="our-values__shell">
    <header class="our-values__header">
      <h2 id="our-values-title">Nuestros Valores</h2>
      <span class="our-values__accent" aria-hidden="true"></span>
    </header>

    <div class="our-values__grid">
      @for (item of values; track item.title) {
        <article class="value-card">
          <div class="value-card__icon" aria-hidden="true">
            @switch (item.icon) {
              @case ('puntualidad') {
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M12 2.6a9.4 9.4 0 1 1 0 18.8 9.4 9.4 0 0 1 0-18.8Zm0 1.6a7.8 7.8 0 1 0 0 15.6 7.8 7.8 0 0 0 0-15.6Zm0 2.1a.8.8 0 0 1 .8.8v4.57l2.73 1.57a.8.8 0 1 1-.8 1.38l-3.13-1.8a.8.8 0 0 1-.4-.69V7.1a.8.8 0 0 1 .8-.8Z"
                  />
                </svg>
              }
              @case ('calidad') {
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M12 2.7a.8.8 0 0 1 .6.26l1.72 1.98 2.6-.2a.8.8 0 0 1 .67.28l1.72 1.98 2.57.55a.8.8 0 0 1 .5 1.23l-1.4 2.2.22 2.6a.8.8 0 0 1-.92.84l-2.57-.55-2.2 1.4a.8.8 0 0 1-.9-.05L12 14.1l-2.26 1.48a.8.8 0 0 1-.9.05l-2.2-1.4-2.57.55a.8.8 0 0 1-.92-.84l.22-2.6-1.4-2.2a.8.8 0 0 1 .5-1.23l2.57-.55 1.72-1.98a.8.8 0 0 1 .67-.28l2.6.2 1.72-1.98a.8.8 0 0 1 .6-.26Zm0 2.03-1.36 1.57a.8.8 0 0 1-.67.27l-2.07-.17-1.36 1.56a.8.8 0 0 1-.45.26l-2.04.44 1.11 1.74a.8.8 0 0 1 .12.5l-.18 2.06 2.04-.44a.8.8 0 0 1 .6.1L9.48 14a.8.8 0 0 1 .44.79l-.09 1.24 1.31-.86a.8.8 0 0 1 .88 0l1.31.86-.09-1.24a.8.8 0 0 1 .44-.79l1.75-1.1a.8.8 0 0 1 .6-.1l2.04.44-.18-2.06a.8.8 0 0 1 .12-.5l1.11-1.74-2.04-.44a.8.8 0 0 1-.45-.26l-1.36-1.56-2.07.17a.8.8 0 0 1-.67-.27L12 4.73Z"
                  />
                </svg>
              }
              @case ('profesionalismo') {
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M12 2.8a4 4 0 0 1 4 4v.9a2.7 2.7 0 0 1 2.2 2.64V17a3 3 0 0 1-3 3H8.8a3 3 0 0 1-3-3v-6.66A2.7 2.7 0 0 1 8 7.7v-.9a4 4 0 0 1 4-4Zm0 1.6a2.4 2.4 0 0 0-2.4 2.4v.8h4.8v-.8A2.4 2.4 0 0 0 12 4.4Zm3.5 4.8h-7a1.1 1.1 0 0 0-1.1 1.1V17a1.4 1.4 0 0 0 1.4 1.4h6.4a1.4 1.4 0 0 0 1.4-1.4v-6.7a1.1 1.1 0 0 0-1.1-1.1Zm-3.5 2.2a.8.8 0 0 1 .8.8v2.9a.8.8 0 1 1-1.6 0v-2.9a.8.8 0 0 1 .8-.8Z"
                  />
                </svg>
              }
              @case ('pasion') {
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M12 20.9a.8.8 0 0 1-.5-.18C9.2 18.8 3.5 14.2 3.5 9.2a4.7 4.7 0 0 1 8.2-3.1A4.7 4.7 0 0 1 20 9.2c0 5-5.7 9.6-8 11.52a.8.8 0 0 1-.5.17Zm-3.8-15a3.1 3.1 0 0 0-3.1 3.3c0 3.82 4.34 7.65 6.9 9.8 2.56-2.15 6.9-5.98 6.9-9.8a3.1 3.1 0 0 0-5.71-1.7.8.8 0 0 1-1.3 0A3.1 3.1 0 0 0 8.2 5.9Z"
                  />
                </svg>
              }
            }
          </div>

          <h3>{{ item.title }}</h3>
          <p>{{ item.description }}</p>
        </article>
      }
    </div>
  </div>
</section>
