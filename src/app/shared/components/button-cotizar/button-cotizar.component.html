<a
  [href]="whatsappUrl"
  class="floating-button"
  target="_blank"
  rel="noopener noreferrer"
  [attr.aria-label]="label"
>
  <span>{{ label }}</span>
  <img
    [src]="imageSrc"
    [alt]="label"
    class="whatsapp-icon"
    loading="lazy"
    decoding="async"
    fetchpriority="low"
    width="512"
    height="512"
  />
</a>
